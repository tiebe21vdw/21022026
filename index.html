<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <!-- Meta tags for responsive design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Description for the site -->
    <meta name="description" content="A site dedicated to my Love, filled with love and affection.">
    <title>Site dedicated to my Love &lt;3</title>
    <!-- Link to CSS -->
    <link rel="stylesheet" href="style.css">
    
</head>
<body class="body">
    <div id="lockScreen" class="lock-screen">
        <div class="lock-card">
            <h1>Voer de code in</h1>
            <p>Je moet eerst de juiste code invullen om verder te gaan.</p>
            <input id="accessCodeInput" type="password" placeholder="Code" autocomplete="off">
            <button id="unlockButton" type="button">Verder</button>
            <p id="codeError" class="code-error" aria-live="polite"></p>
        </div>
    </div>

    <div id="protectedContent" class="protected-content is-hidden">
    <!-- Main content container -->
    <div class="container">
        <img id="loveImage" src="images/Schermafbeelding 2026-03-06 004320.png" class="container-background" alt="Memory image">

        <div class="message-container">
            <!-- Message display -->
            <p id="message" class="message">HEYYYYYYY!</p>
        </div>
        <div class="navigation">
            <!-- Navigation buttons -->
            <button onclick="prev()" class="prevBtn">&lt;</button>
            <button onclick="next()" class="nextBtn">&gt;</button>
        </div>
    </div>
    <div class="spotify-container">
        <!-- Spotify embed -->
        <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/track/4eHbdreAnSOrDDsFfc4Fpm?utm_source=generator&theme=0" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
    </div>
    </div>
    <script src="script.js" defer></script>
</body>
</html>
